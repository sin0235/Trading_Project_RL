tickers:
  - ACB
  - BID
  - BVH
  - CTG
  - FPT
  - GAS
  - HPG
  - MBB
  - MSN
  - MWG
  - SHB
  - SSI
  - STB
  - VCB
  - VIC
  - VNM

features:
  - close_norm
  - return_1d
  - return_5d
  - return_20d
  - macd
  - rsi
  - adx
  - volume_norm
  - volatility_20d

window_size: 30
data_path: data/processed_v2

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

initial_balance: 1000000000
fee_rate: 0.001
max_steps_train: 378
max_steps_eval: 9999

reward_scaling: 1.0
reward_name: advanced
reward_window: 20
reward_excess_scale: 100.0
reward_advanced_alpha: 0.05
reward_advanced_beta: 1.10
reward_advanced_gamma: 0.04
trade_deadband: 0.0
max_weight_change_per_step: 1.0

hidden_size: 128
num_layers: 2
dropout: 0.1
log_std_init: -0.5
dirichlet_total_concentration: 0.0

learning_rate: 0.0012
n_steps: 2048
batch_size: 128
n_epochs: 28
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.40
ent_coef: 0.0
vf_coef: 0.20
max_grad_norm: 1.0
target_kl: null

total_timesteps: 600000
lr_decay: true
lr_schedule: cosine
min_learning_rate: 0.0001
eval_freq: 5
save_freq: 5
milestone_checkpoint_steps:
  - 150000
  - 300000
  - 450000
  - 600000
n_eval_episodes: 3
early_stop_patience_evals: 0
early_stop_min_delta: 0.005
early_stop_min_evals: 8
early_stop_baseline: off
early_stop_baseline_patience_evals: 0

seed: 42
device: cpu
