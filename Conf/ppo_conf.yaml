tickers:
  - ACB
  - BID
  - BVH
  - CTG
  - FPT
  - GAS
  - HPG
  - MBB
  - MSN
  - MWG
  - SHB
  - SSI
  - STB
  - VCB
  - VIC
  - VNM

features:
  - close_norm
  - return_1d
  - return_5d
  - return_20d
  - macd
  - rsi
  - adx
  - volume_norm
  - volatility_20d

# ============================================================
#  WINDOW SIZE
#  30 la du cho LSTM bat pattern ngan-trung han.
#  60 tang input size gap doi (60*16*9=8640) nhung khong
#  cho them gia tri tuong xung, LSTM kho hoc hon.
# ============================================================
window_size: 30

data_path: data/processed_v2

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

initial_balance: 1000000000
fee_rate: 0.001
max_steps_train: 378
max_steps_eval: 9999

reward_scaling: 1.0
reward_name: advanced
reward_window: 20
reward_sharpe_scale: 1.0
reward_excess_scale: 60.0
reward_drawdown_scale: 2.0
reward_turnover_scale: 0.3
trade_deadband: 0.015
max_weight_change_per_step: 0.12

# ============================================================
#  MODEL (LSTM)
# ============================================================
hidden_size: 128
num_layers: 2
dropout: 0.1
# Legacy key: giu lai de tuong thich nguoc, model hien tai khong con dung.
log_std_init: -0.5

dirichlet_total_concentration: 16.0

learning_rate: 0.0003
n_steps: 2048
batch_size: 256
n_epochs: 12
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: 0.03

# ============================================================
#  TRAINING SCHEDULE
# ============================================================
total_timesteps: 600000
lr_decay: true
lr_schedule: cosine
min_learning_rate: 0.00003
eval_freq: 5
save_freq: 5
milestone_checkpoint_steps:
  - 100000
  - 300000
  - 500000
n_eval_episodes: 3
# Tat early stopping dua tren ket qua val.
early_stop_patience_evals: 0
early_stop_min_delta: 0.005
early_stop_min_evals: 8
early_stop_baseline: off
early_stop_baseline_patience_evals: 0

seed: 42
device: auto
