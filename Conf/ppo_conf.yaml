tickers:
  - ACB
  - BID
  - BVH
  - CTG
  - FPT
  - GAS
  - HPG
  - MBB
  - MSN
  - MWG
  - SHB
  - SSI
  - STB
  - VCB
  - VIC
  - VNM

features:
  - close_norm
  - return_1d
  - return_5d
  - macd
  - rsi
  - adx
  - volume_norm

window_size: 60

data_path: data/processed

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

initial_balance: 1000000000
fee_rate: 0.001
max_steps_train: 512
max_steps_eval: 9999
reward_scaling: 1.0
reward_name: sharpe
reward_window: 30
trade_deadband: 0.03
max_weight_change_per_step: 0.07

hidden_size: 128
num_layers: 2
dropout: 0.1
# Legacy key: giu lai de tuong thich nguoc, model hien tai khong con dung.
log_std_init: -0.5

learning_rate: 0.0002
n_steps: 2048
batch_size: 256
n_epochs: 10
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: 0.02

total_timesteps: 500000
lr_schedule: cosine
min_learning_rate: 0.0001
eval_freq: 5
save_freq: 5
n_eval_episodes: 1

seed: 42
device: auto
