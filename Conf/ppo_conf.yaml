tickers:
  - ACB
  - BID
  - BVH
  - CTG
  - FPT
  - GAS
  - HPG
  - MBB
  - MSN
  - MWG
  - SHB
  - SSI
  - STB
  - VCB
  - VIC
  - VNM

features:
  - close_norm
  - return_1d
  - return_5d
  - return_20d
  - macd
  - rsi
  - adx
  - volume_norm
  - volatility_20d

# ============================================================
#  WINDOW SIZE
#  30 la du cho LSTM bat pattern ngan-trung han.
#  60 tang input size gap doi (60*16*9=8640) nhung khong
#  cho them gia tri tuong xung, LSTM kho hoc hon.
# ============================================================
window_size: 30

data_path: data/processed_v2

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

initial_balance: 1000000000
fee_rate: 0.001
max_steps_train: 378
max_steps_eval: 9999

reward_scaling: 1.0
reward_name: advanced
reward_window: 30
reward_sharpe_scale: 1.0
reward_excess_scale: 80.0
reward_drawdown_scale: 2.0
reward_turnover_scale: 0.3
reward_advanced_alpha: 0.08
reward_advanced_beta: 1.25
reward_advanced_gamma: 0.08
# Mo deadband so voi run cu, nhung van giu 1 lop on dinh de tranh overtrade.
trade_deadband: 0.002
# Cho phep doi ty trong manh hon run cu, nhung chua tha noi 100%.
max_weight_change_per_step: 0.60

# ============================================================
#  MODEL (LSTM)
# ============================================================
hidden_size: 128
num_layers: 2
dropout: 0.1
# Legacy key: giu lai de tuong thich nguoc, model hien tai khong con dung.
log_std_init: -0.5

# Giam manh prior so voi 16.0 cua run cu, nhung van giu policy on dinh.
dirichlet_total_concentration: 4.0

learning_rate: 0.0007
n_steps: 1536
batch_size: 128
n_epochs: 18
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.30
ent_coef: 0.0008
vf_coef: 0.30
max_grad_norm: 0.7
target_kl: 0.08

# ============================================================
#  TRAINING SCHEDULE
# ============================================================
total_timesteps: 900000
lr_decay: true
lr_schedule: cosine
min_learning_rate: 0.00008
eval_freq: 5
save_freq: 5
milestone_checkpoint_steps:
  - 150000
  - 300000
  - 600000
  - 900000
n_eval_episodes: 3
# Tat early stopping dua tren ket qua val.
early_stop_patience_evals: 0
early_stop_min_delta: 0.005
early_stop_min_evals: 8
early_stop_baseline: off
early_stop_baseline_patience_evals: 0

seed: 42
device: auto
