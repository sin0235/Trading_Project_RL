tickers:
  - ACB
  - BID
  - BVH
  - CTG
  - FPT
  - GAS
  - HPG
  - MBB
  - MSN
  - MWG
  - SHB
  - SSI
  - STB
  - VCB
  - VIC
  - VNM

features:
  - close_norm
  - return_1d
  - return_5d
  - macd
  - rsi
  - adx
  - volume_norm

window_size: 30

data_path: data/processed

train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15

initial_balance: 1000000000
fee_rate: 0.001
max_steps_train: 256
max_steps_eval: 9999
reward_scaling: 1.0
reward_name: tmp
reward_window: 20

hidden_size: 128
num_layers: 1
dropout: 0.0
# Legacy key: giu lai de tuong thich nguoc, model hien tai khong con dung.
log_std_init: -0.5

learning_rate: 0.0001
n_steps: 1024
batch_size: 256
n_epochs: 4
gamma: 0.99
gae_lambda: 0.97
clip_range: 0.12
ent_coef: 0.001
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: 0.012

total_timesteps: 200000
lr_schedule: linear
min_learning_rate: 0.00002
eval_freq: 5
save_freq: 5
n_eval_episodes: 1

seed: 42
device: auto

