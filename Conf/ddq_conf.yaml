epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 200000

total_timesteps: 500000
lr_schedule: cosine
min_learning_rate: 0.00001

eval_freq: 10000
save_freq: 20000
milestone_checkpoint_steps:
  - 100
n_eval_episodes: 1

seed: 42
device: auto
